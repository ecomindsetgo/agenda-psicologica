<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Psicología Pro+</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .animate-slide-up { animation: slide-up 0.3s ease-out; }
        @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; }
        }
        .print-only { display: none; }
    </style>
</head>
<body class="mb-24">

    <!-- Header -->
    <header class="bg-indigo-700 text-white p-5 sticky top-0 z-10 shadow-lg no-print">
        <div class="flex justify-between items-center max-w-2xl mx-auto">
            <div>
                <h1 class="text-xl font-bold">Agenda Psicológica</h1>
                <p id="current-date" class="text-xs opacity-80 capitalize"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-indigo-600 hover:bg-indigo-500 p-2 rounded-lg transition-colors" title="Copia de Seguridad">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                    </svg>
                </button>
                <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-500 p-2 rounded-lg transition-colors" title="Generar Reporte Diario">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Vista de Impresión -->
    <div class="print-only p-8">
        <h1 class="text-2xl font-bold border-b-2 pb-2 mb-4">Reporte Diario de Consultas</h1>
        <p class="mb-6">Fecha: <span id="print-date-label"></span></p>
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b">
                    <th class="py-2">Hora</th>
                    <th class="py-2">Paciente</th>
                    <th class="py-2">Notas</th>
                    <th class="py-2">Estado</th>
                </tr>
            </thead>
            <tbody id="print-table-body"></tbody>
        </table>
    </div>

    <main class="max-w-2xl mx-auto p-4 space-y-6 no-print">
        
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Citas Hoy</p>
                <p id="stats-today" class="text-3xl font-black text-indigo-600">0</p>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200">
                <p class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Pendientes Totales</p>
                <p id="stats-pending" class="text-3xl font-black text-amber-500">0</p>
            </div>
        </div>

        <!-- Buscador y Filtro -->
        <div class="space-y-3">
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </span>
                <input type="text" id="search-input" oninput="renderAppointments()" placeholder="Buscar paciente por nombre..." class="w-full pl-10 pr-4 py-3 bg-white border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 text-sm shadow-sm">
            </div>
            
            <div class="flex items-center gap-2 overflow-x-auto pb-2 no-scrollbar">
                <input type="date" id="date-filter" onchange="renderAppointments()" class="bg-white border border-slate-200 rounded-xl px-4 py-2 text-sm font-semibold outline-none focus:ring-2 focus:ring-indigo-500 text-slate-600">
                <button onclick="goToToday()" class="bg-indigo-50 text-indigo-600 px-4 py-2 rounded-xl text-xs font-bold whitespace-nowrap">Hoy</button>
            </div>
        </div>

        <!-- Lista de Citas -->
        <section id="list-section">
            <div id="appointments-container" class="space-y-3"></div>
        </section>

        <!-- Botón Flotante -->
        <button onclick="openModal()" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-2xl shadow-indigo-300 flex items-center justify-center active:scale-95 transition-all z-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
        </button>

    </main>

    <!-- Modal Formulario -->
    <div id="modal" class="fixed inset-0 bg-slate-900/60 hidden z-20 flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm no-print">
        <div class="bg-white w-full max-w-md rounded-t-3xl sm:rounded-3xl p-6 shadow-2xl animate-slide-up">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-title" class="text-xl font-bold text-slate-800">Agendar Paciente</h3>
                <button onclick="closeModal()" class="text-slate-400 p-2 hover:bg-slate-100 rounded-full text-2xl">&times;</button>
            </div>
            
            <form id="appointment-form" class="space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1 tracking-tight">Paciente</label>
                    <input type="text" id="patient-name" required placeholder="Nombre completo" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Fecha</label>
                        <input type="date" id="appointment-date" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Hora</label>
                        <input type="time" id="appointment-time" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Notas</label>
                    <textarea id="appointment-notes" rows="2" placeholder="Motivo o seguimiento..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none"></textarea>
                </div>
                
                <div id="error-message" class="hidden text-red-500 text-xs font-bold bg-red-50 p-3 rounded-xl border border-red-100"></div>

                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 bg-slate-100 text-slate-600 py-4 rounded-2xl font-bold">Cancelar</button>
                    <button type="submit" id="btn-save" class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Versión de almacenamiento para evitar conflictos con pruebas previas
        const STORAGE_KEY = 'psico_appointments_final_v1';
        let appointments = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        function init() {
            goToToday();
            document.getElementById('current-date').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'long' });
            renderAppointments();
            updateStats();
        }

        function goToToday() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('date-filter').value = today;
            renderAppointments();
        }

        function openModal(editId = null) {
            const modal = document.getElementById('modal');
            const form = document.getElementById('appointment-form');
            const title = document.getElementById('modal-title');
            const btn = document.getElementById('btn-save');
            const errorMsg = document.getElementById('error-message');
            
            errorMsg.classList.add('hidden');
            form.reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('appointment-date').value = document.getElementById('date-filter').value;
            
            if (editId) {
                const appt = appointments.find(a => a.id === editId);
                if (appt) {
                    title.innerText = "Editar Cita";
                    btn.innerText = "Actualizar";
                    document.getElementById('edit-id').value = appt.id;
                    document.getElementById('patient-name').value = appt.patient;
                    document.getElementById('appointment-date').value = appt.date;
                    document.getElementById('appointment-time').value = appt.time;
                    document.getElementById('appointment-notes').value = appt.notes;
                }
            } else {
                title.innerText = "Nueva Cita";
                btn.innerText = "Guardar Cita";
            }
            modal.classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        document.getElementById('appointment-form').onsubmit = function(e) {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const patient = document.getElementById('patient-name').value;
            const date = document.getElementById('appointment-date').value;
            const time = document.getElementById('appointment-time').value;
            const notes = document.getElementById('appointment-notes').value;
            const errorMsg = document.getElementById('error-message');

            const conflict = appointments.find(a => 
                a.date === date && a.time === time && a.id.toString() !== editId.toString()
            );

            if (conflict) {
                errorMsg.innerText = `Conflicto: ${conflict.patient} ya ocupa ese horario.`;
                errorMsg.classList.remove('hidden');
                return;
            }

            if (editId) {
                const index = appointments.findIndex(a => a.id.toString() === editId);
                appointments[index] = { ...appointments[index], patient, date, time, notes };
            } else {
                appointments.push({ id: Date.now(), patient, date, time, notes, status: 'pendiente' });
            }

            saveData();
            closeModal();
            renderAppointments();
            updateStats();
        };

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appointments));
        }

        function setStatus(id, newStatus) {
            const appt = appointments.find(a => a.id === id);
            if (appt) appt.status = appt.status === newStatus ? 'pendiente' : newStatus;
            saveData();
            renderAppointments();
            updateStats();
        }

        function deleteAppointment(id) {
            if(confirm("¿Eliminar esta cita definitivamente?")) {
                appointments = appointments.filter(a => a.id !== id);
                saveData();
                renderAppointments();
                updateStats();
            }
        }

        function renderAppointments() {
            const container = document.getElementById('appointments-container');
            const filterDate = document.getElementById('date-filter').value;
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const printTable = document.getElementById('print-table-body');
            const printDateLabel = document.getElementById('print-date-label');
            
            printDateLabel.innerText = filterDate;

            const filtered = appointments
                .filter(a => (searchTerm ? a.patient.toLowerCase().includes(searchTerm) : a.date === filterDate))
                .sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time));

            printTable.innerHTML = filtered.map(a => `
                <tr class="border-b text-sm">
                    <td class="py-2">${a.time}</td>
                    <td class="py-2 font-bold">${a.patient}</td>
                    <td class="py-2">${a.notes || '-'}</td>
                    <td class="py-2 capitalize">${a.status}</td>
                </tr>
            `).join('');

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="bg-white p-12 rounded-3xl border-2 border-dashed border-slate-200 text-center text-slate-400">
                        <p class="font-medium">${searchTerm ? 'No hay resultados' : 'Sin citas para hoy'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filtered.map(appt => {
                const isCompleted = appt.status === 'completada';
                return `
                <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col gap-3 transition-all ${isCompleted ? 'opacity-60 grayscale-[0.3]' : ''}">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3 flex-1 overflow-hidden" onclick="openModal(${appt.id})">
                            <div class="bg-indigo-100 text-indigo-700 font-black p-2 rounded-xl text-[10px] min-w-[55px] text-center">
                                ${appt.time}
                            </div>
                            <div class="truncate">
                                <h4 class="font-bold text-slate-800 truncate">${appt.patient}</h4>
                                ${searchTerm ? `<p class="text-[10px] text-indigo-500 font-bold">${appt.date}</p>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="setStatus(${appt.id}, 'completada')" class="h-9 w-9 flex items-center justify-center rounded-lg ${isCompleted ? 'bg-emerald-500 text-white' : 'bg-slate-100 text-slate-400'}">
                                ✓
                            </button>
                            <button onclick="deleteAppointment(${appt.id})" class="h-9 w-9 flex items-center justify-center rounded-lg bg-red-50 text-red-300">
                                ✕
                            </button>
                        </div>
                    </div>
                    <div class="flex items-center justify-between border-t border-slate-50 pt-2">
                        <p class="text-[11px] text-slate-400 italic truncate flex-1 pr-2">${appt.notes || 'Sin notas adicionales'}</p>
                        <a href="https://wa.me/?text=Hola%20${encodeURIComponent(appt.patient)},%20te%20confirmo%20tu%20cita%20del%20día%20${appt.date}%20a%20las%20${appt.time}.%20¡Saludos!" target="_blank" class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-1 rounded-md">
                            WhatsApp
                        </a>
                    </div>
                </div>
                `;
            }).join('');
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const todayCount = appointments.filter(a => a.date === today).length;
            const pendingCount = appointments.filter(a => a.status === 'pendiente').length;
            document.getElementById('stats-today').innerText = todayCount;
            document.getElementById('stats-pending').innerText = pendingCount;
        }

        function exportData() {
            const dataStr = JSON.stringify(appointments, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `agenda_backup_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        window.onload = init;
    </script>
</body>
</html>
